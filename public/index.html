<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <title>Azure Dice Roller</title>
    <link rel="stylesheet" href="index.css">
</head>

<body onload="wakeUpServer(); rollDice()">

    <h1>Dice Roller</h1>
    <p id="status">Status: Connecting to Azure...</p>

    Die 1: <input id="d1" readonly><br><br>
    Die 2: <input id="d2" readonly><br><br>
    Die 3: <input id="d3" readonly><br><br>
    Die 4: <input id="d4" readonly><br><br>
    Die 5: <input id="d5" readonly><br><br>

    <button id="rollButton" onclick="rollDice()" autofocus>Roll Dice</button>
    <button onclick="testCorsFailure()">Test CORS Failure</button>

    <div id="cors-out" style="margin-top: 20px; color: yellow; font-weight: bold;"></div>

    <script>
      const API =
        "https://web-dice-roller-nodejs-fhggc7e2hyakdcep.centralus-01.azurewebsites.net"

      // Wake up server when page loads
      async function wakeUpServer() {
        try {
          await fetch(`${API}/api/ping`)
          document.getElementById("status").textContent =
            "Status: Connected to Azure server"
          rollDice()
        } catch {
          document.getElementById("status").textContent =
            "Status: Server unreachable"
        }
      }

      // Roll dice using server API
      async function rollDice() {
        const response = await fetch(`${API}/roll/5`)
        const data = await response.json()

        document.getElementById("d1").value = data.rolls[0]
        document.getElementById("d2").value = data.rolls[1]
        document.getElementById("d3").value = data.rolls[2]
        document.getElementById("d4").value = data.rolls[3]
        document.getElementById("d5").value = data.rolls[4]
      }

      // Trigger CORS failure endpoint
      async function testCorsFailure() {
        try {
          await fetch(`${API}/roll-no-cors/5`)
        } catch {
          document.getElementById("cors-out").textContent =
            "CORS request blocked (expected)"
        }
      }
    </script>
</body>
</html>
