<!DOCTYPE html>

<html lang="en-US">

<head>

  <meta charset="UTF-8">

  <title>Web Dice API Test</title>

</head>

<body style="font-family: sans-serif; padding: 1em; background-color: blueviolet;">

  <h1>Web Dice API Test</h1>

  <button onclick="rollOne()" autofocus>Roll One</button>

  <button onclick="rollFive()" autofocus>Roll Five</button>

  <button onclick="rollFailure()" autofocus>CORS Roll Failure</button>

  <pre id="out"></pre>

  <script>
    const API = "https://web-dice-roller-nodejs-fhggc7e2hyakdcep.centralus-01.azurewebsites.net"

    async function rollOne() {
      const response = await fetch(`${API}/roll/1`)
      const data = await response.json()
      document.getElementById('out').textContent =
        JSON.stringify(data, null, 2)
    }

    async function rollFive() {
      const response = await fetch(`${API}/roll/5`)
      const data = await response.json()
      document.getElementById('out').textContent =
        JSON.stringify(data, null, 2)
    }

    async function rollFailure() {
      try {
        const response = await fetch(`${API}/roll-no-cors/5`)
        const data = await response.json()
        document.getElementById('out').textContent =
          JSON.stringify(data, null, 2)
      } catch (error) {
        document.getElementById('out').textContent =
          "CORS error (intentional)"
      }
}
